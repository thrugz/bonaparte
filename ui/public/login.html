<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="/brand.css">
  <title>Bonaparte</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: var(--grad-subtle);
      pointer-events: none;
    }
    .login-box {
      width: 340px;
      padding: 40px 32px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg-1);
      position: relative;
      z-index: 1;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo img { height: 40px; opacity: 0.85; margin-bottom: 14px; }
    .logo-sub {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-3);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .error {
      background: var(--red-dim);
      border: 1px solid rgba(239,68,68,0.2);
      color: var(--red);
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .error.show { display: block; }
    label {
      display: block;
      font-size: 12px;
      color: var(--text-3);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border-hi);
      border-radius: 4px;
      color: var(--text);
      font-size: 14px;
      font-family: var(--font-mono);
      outline: none;
      margin-bottom: 20px;
    }
    input[type="password"]:focus { border-color: var(--accent); }
    button {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-family: var(--font-head);
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: var(--v5); }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo"><img src="/vitus-logo.png" alt="Vitus" style="display:block;margin:0 auto"><div class="logo-sub">Bonaparte</div></div>
    <div class="error" id="err">Wrong password</div>
    <form method="POST" action="/login">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus>
      <button type="submit">Log in</button>
    </form>
  </div>
  <script>
    if (location.search.includes('error=1')) document.getElementById('err').classList.add('show');
  </script>
</body>
</html>
