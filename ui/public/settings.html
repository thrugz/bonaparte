<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="/brand.css">
  <title>Bonaparte — Settings</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 14px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .container { max-width: 900px; margin: 0 auto; padding: 24px; }

    h2 { font-family: var(--font-head); font-size: 18px; color: var(--accent); margin: 32px 0 16px; font-weight: 500; }
    h2:first-child { margin-top: 0; }

    .token-grid { display: grid; gap: 12px; }
    .token-row {
      display: grid; grid-template-columns: 180px 1fr 80px 80px; gap: 12px; align-items: center;
      padding: 10px 14px; background: var(--bg-1); border: 1px solid var(--border); border-radius: 6px;
    }
    .token-label { font-family: var(--font-mono); font-size: 13px; color: var(--text-3); }
    .token-value { font-family: var(--font-mono); font-size: 13px; color: var(--text); }
    .token-status { font-size: 13px; text-align: center; }
    .token-status.ok { color: var(--green); }
    .token-status.fail { color: var(--red); }
    .token-status.pending { color: var(--text-3); }
    button {
      padding: 6px 14px; background: var(--bg-3); color: var(--text); border: 1px solid var(--border-hi);
      border-radius: 4px; font-size: 13px; font-family: var(--font-body); cursor: pointer;
    }
    button:hover { background: var(--bg-4); }
    button.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
    button.primary:hover { background: var(--v5); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .job-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    .job-table th { text-align: left; font-size: 13px; color: var(--text-3); padding: 8px 12px; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 1px; }
    .job-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
    .job-table .mono { font-family: var(--font-mono); font-size: 13px; }
    .job-table tr.disabled td { opacity: 0.4; }
    .job-table tr.disabled td:last-child { opacity: 1; }

    .toggle { position: relative; display: inline-block; width: 36px; height: 20px; cursor: pointer; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider { position: absolute; inset: 0; background: var(--bg-3); border-radius: 10px; transition: 0.2s; }
    .toggle .slider:before { content: ""; position: absolute; width: 16px; height: 16px; left: 2px; bottom: 2px; background: var(--text-3); border-radius: 50%; transition: 0.2s; }
    .toggle input:checked + .slider { background: var(--accent); }
    .toggle input:checked + .slider:before { transform: translateX(16px); background: var(--bg); }

    .job-actions { display: flex; gap: 6px; align-items: center; }
    .btn-icon { padding: 4px 8px; font-size: 13px; background: none; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; color: var(--text-2); }
    .btn-icon:hover { background: var(--bg-3); color: var(--text); }
    .btn-icon.danger:hover { background: var(--red); color: var(--bg); border-color: var(--red); }

    .inline-edit { background: var(--bg-2); border: 1px solid var(--border-hi); border-radius: 4px; color: var(--text); font-family: var(--font-mono); font-size: 13px; padding: 4px 8px; width: 100%; }
    .inline-edit:focus { outline: none; border-color: var(--accent); }

    .add-job-row { display: flex; gap: 8px; margin-top: 12px; align-items: center; }
    .add-job-row input { flex: 1; }

    .log-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    .log-table th { text-align: left; font-size: 12px; color: var(--text-3); padding: 6px 10px; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 1px; }
    .log-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 13px; font-family: var(--font-mono); }
    .log-table .ok { color: var(--green); }
    .log-table .error { color: var(--red); }
    .log-table .running { color: var(--accent); }
    .log-table .summary { color: var(--text-2); font-size: 12px; max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>
  <div class="top-nav">
    <a href="/" class="logo"><img src="/vitus-logo.png" alt="Vitus"><span class="sep"></span><span class="sub">Bonaparte</span></a>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/timeline">Timeline</a>
      <a href="/competitors">Competitors</a>
      <a href="/features">Feature Hunt</a>
      <a href="/vchat">vChat</a>
      <a href="/content">Content</a>
      <a href="/settings" class="active">Settings</a>
      <span class="nav-sep"></span>
      <a href="/logout" class="logout">Log out</a>
    </nav>
  </div>
  <div class="container">

    <h2>Tokens</h2>
    <div class="token-grid" id="tokens"></div>

    <h2>Scheduled Jobs</h2>
    <table class="job-table" id="jobs">
      <thead><tr><th>On</th><th>Job</th><th>Schedule</th><th>Last Run</th><th>Status</th><th></th></tr></thead>
      <tbody></tbody>
    </table>
    <div class="add-job-row">
      <input type="text" class="inline-edit" id="new-job-name" placeholder="job-name">
      <input type="text" class="inline-edit" id="new-job-cron" placeholder="*/5 * * * *" style="max-width:160px">
      <input type="text" class="inline-edit" id="new-job-desc" placeholder="Description">
      <button onclick="addJob()">Add</button>
    </div>

    <h2>Job History</h2>
    <table class="log-table" id="log">
      <thead><tr><th>Time</th><th>Job</th><th>Status</th><th>Duration</th><th>Summary</th></tr></thead>
      <tbody></tbody>
    </table>

  </div>

  <script src="/toast.js"></script>
  <script>
    async function checkAuth() {
      const r = await fetch('/api/me');
      if (r.status === 401) location.href = '/login';
    }

    async function loadTokens() {
      const r = await fetch('/api/settings/tokens');
      const tokens = await r.json();
      const el = document.getElementById('tokens');
      el.innerHTML = '';
      for (const [key, masked] of Object.entries(tokens)) {
        const row = document.createElement('div');
        row.className = 'token-row';
        row.innerHTML = `
          <span class="token-label">${key}</span>
          <span class="token-value">${masked}</span>
          <span class="token-status pending" id="status-${key}">—</span>
          <button onclick="testToken('${key}')">Test</button>
        `;
        el.appendChild(row);
      }
    }

    async function testToken(key) {
      const el = document.getElementById('status-' + key);
      el.textContent = '...';
      el.className = 'token-status pending';
      const r = await fetch('/api/settings/test-token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key }),
      });
      const data = await r.json();
      el.textContent = data.ok ? '● OK' : '● Fail';
      el.className = 'token-status ' + (data.ok ? 'ok' : 'fail');
      if (data.detail) el.title = data.detail;
    }

    async function loadJobs() {
      const r = await fetch('/api/jobs');
      const { runs, scheduled } = await r.json();

      const tbody = document.querySelector('#jobs tbody');
      tbody.innerHTML = '';
      for (const job of scheduled) {
        const lastStatus = job.lastRun?.status || '—';
        const lastTime = job.lastRun?.started_at ? new Date(job.lastRun.started_at).toLocaleString() : 'Never';
        const statusClass = lastStatus === 'ok' ? 'ok' : lastStatus === 'error' ? 'error' : '';
        const tr = document.createElement('tr');
        if (!job.enabled) tr.className = 'disabled';
        tr.innerHTML = `
          <td>
            <label class="toggle">
              <input type="checkbox" ${job.enabled ? 'checked' : ''} onchange="toggleJob('${job.name}', this.checked)">
              <span class="slider"></span>
            </label>
          </td>
          <td>${job.description}</td>
          <td class="mono">
            <input class="inline-edit" value="${job.cron}" style="width:140px"
              onblur="editCron('${job.name}', this.value)"
              onkeydown="if(event.key==='Enter'){this.blur()}">
          </td>
          <td class="mono">${lastTime}</td>
          <td class="${statusClass}">${lastStatus}</td>
          <td>
            <div class="job-actions">
              <button onclick="runJob('${job.name}')" id="btn-${job.name}" ${!job.implemented ? 'disabled title="No implementation"' : ''}>Run</button>
              <button class="btn-icon danger" onclick="removeJob('${job.name}')" title="Delete">✕</button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      }

      const logBody = document.querySelector('#log tbody');
      logBody.innerHTML = '';
      for (const run of runs.slice(0, 20)) {
        const start = new Date(run.started_at);
        const end = run.finished_at ? new Date(run.finished_at) : null;
        const duration = end ? Math.round((end - start) / 1000) + 's' : '...';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${start.toLocaleString()}</td>
          <td>${run.job_name}</td>
          <td class="${run.status}">${run.status}</td>
          <td>${duration}</td>
          <td class="summary" title="${(run.summary || run.error || '').replace(/"/g, '&quot;')}">${run.summary || run.error || '—'}</td>
        `;
        logBody.appendChild(tr);
      }
    }

    async function toggleJob(name, enabled) {
      const r = await fetch('/api/jobs/' + name, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enabled }),
      });
      const data = await r.json();
      if (data.error) toast(data.error, 'error');
      else toast(name + (enabled ? ' enabled' : ' disabled'));
      await loadJobs();
    }

    async function editCron(name, cron) {
      const r = await fetch('/api/jobs/' + name, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cron }),
      });
      const data = await r.json();
      if (data.error) { toast(data.error, 'error'); await loadJobs(); }
      else toast(name + ' schedule updated');
    }

    async function removeJob(name) {
      if (!confirm('Delete job "' + name + '"? This cannot be undone.')) return;
      const r = await fetch('/api/jobs/' + name, { method: 'DELETE' });
      const data = await r.json();
      if (data.error) toast(data.error, 'error');
      else toast(name + ' deleted');
      await loadJobs();
    }

    async function addJob() {
      const name = document.getElementById('new-job-name').value.trim();
      const cron = document.getElementById('new-job-cron').value.trim();
      const description = document.getElementById('new-job-desc').value.trim();
      if (!name || !cron) { toast('Name and cron are required', 'error'); return; }
      const r = await fetch('/api/jobs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, cron, description: description || name, enabled: true }),
      });
      const data = await r.json();
      if (data.error) toast(data.error, 'error');
      else {
        toast(name + ' created');
        document.getElementById('new-job-name').value = '';
        document.getElementById('new-job-cron').value = '';
        document.getElementById('new-job-desc').value = '';
      }
      await loadJobs();
    }

    async function runJob(name) {
      const btn = document.getElementById('btn-' + name);
      btn.disabled = true;
      btn.textContent = '...';
      try {
        await fetch('/api/jobs/' + name + '/run', { method: 'POST' });
      } catch (e) {}
      await loadJobs();
    }

    async function init() {
      await checkAuth();
      await Promise.all([loadTokens(), loadJobs()]);
    }
    init();
    setInterval(loadJobs, 30000);
  </script>
</body>
</html>
